<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeSignal</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="background-glow"></div>

  <main class="app-shell">
    <section class="card">
      <div class="header">
        <div class="logo-wrap">
          <span class="logo">🛡️</span>
        </div>
        <div>
          <h1>SafeSignal</h1>
          <p class="subtitle">
            Detect suspicious messages, risky links, scam-style email content, and screenshot text in seconds.
          </p>
        </div>
      </div>

      <section class="top-strip">
        <div class="mini-stat">
          <span class="mini-stat-label">Modes</span>
          <strong>Text · URL · Email · Screenshot</strong>
        </div>
        <div class="mini-stat">
          <span class="mini-stat-label">Local Status</span>
          <strong>Ready</strong>
        </div>
      </section>

      <label for="scanMode" class="label">Scan mode</label>
      <select id="scanMode" onchange="handleModeChange()">
        <option value="text">Text Scanner</option>
        <option value="url">URL Scanner</option>
        <option value="email">Email Scanner</option>
        <option value="image">Screenshot Scanner</option>
      </select>

      <section id="singleInputSection">
        <label for="inputText" class="label" id="inputLabel">Paste a message or link</label>
        <textarea
          id="inputText"
          placeholder="Example: URGENT! Your bank account is suspended. Verify now..."
        ></textarea>
      </section>

      <section id="emailSection" class="email-section hidden">
        <div class="input-grid">
          <div>
            <label for="emailSender" class="label">Sender</label>
            <input
              id="emailSender"
              type="text"
              placeholder="Example: support@bank-alerts-secure.com"
            />
          </div>

          <div>
            <label for="emailSubject" class="label">Subject</label>
            <input
              id="emailSubject"
              type="text"
              placeholder="Example: Urgent account verification required"
            />
          </div>
        </div>

        <label for="emailBody" class="label">Email body</label>
        <textarea
          id="emailBody"
          placeholder="Paste the email message here..."
        ></textarea>
      </section>

      <section id="imageSection" class="hidden">
        <label for="imageInput" class="label">Upload screenshot</label>
        <input id="imageInput" type="file" accept="image/*" />
        <p class="helper-text">
          Upload a screenshot of a suspicious message, email, or social media post.
        </p>
      </section>

      <div class="demo-buttons">
        <button class="demo-btn" onclick="loadExample('bank')">Bank scam</button>
        <button class="demo-btn" onclick="loadExample('job')">Job scam</button>
        <button class="demo-btn" onclick="loadExample('safe')">Safe message</button>
        <button class="demo-btn" onclick="loadExample('url')">Suspicious URL</button>
        <button class="demo-btn" onclick="loadExample('email')">Scam email</button>
      </div>

      <div class="actions two-buttons">
        <button id="analyzeBtn" onclick="checkScam()">
          <span class="btn-text">Analyze</span>
          <span class="btn-loader hidden"></span>
        </button>

        <button id="clearBtn" class="secondary-btn" onclick="clearAll()">
          Clear
        </button>
      </div>

      <section id="result" class="result-card hidden"></section>

      <section class="history-section">
        <div class="history-header">
          <h3>Recent scans</h3>
          <button class="small-btn" onclick="clearHistory()">Clear history</button>
        </div>
        <div id="historyList" class="history-list">
          <div class="empty-state">No scans yet.</div>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
